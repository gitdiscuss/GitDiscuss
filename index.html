<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitDiscuss - Master Platform</title>
  <link rel="icon" type="image/png" href="GitDiscuss.png">

  <style>
    /* Global Base Layout */
    body {
      background-color: #0d1117;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      box-sizing: border-box;
    }

    /* Reddit/GitHub Card UI Frame */
    .reddit-container {
      width: 100%;
      max-width: 850px;
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      box-sizing: border-box;
    }

    /* Header Profile Layout */
    .forum-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #30363d;
    }

    .community-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      flex-shrink: 0;
      border: 1px solid #30363d;
    }

    .community-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .forum-title {
      margin: 0;
      font-size: 1.5rem;
      color: #f0f6fc;
      font-weight: 600;
    }

    .forum-subtitle {
      margin: 4px 0 0 0;
      font-size: 0.9rem;
      color: #8b949e;
    }

    /* Combined Selectors Row Layout */
    .selectors-row {
      display: flex;
      gap: 16px;
      margin-bottom: 25px;
      background-color: #21262d;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid #30363d;
      flex-wrap: wrap;
    }

    .selector-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 250px;
    }

    .selector-label {
      color: #8b949e;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .master-dropdown {
      background-color: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #f0f6fc;
      padding: 8px 12px;
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      flex-grow: 1;
    }

    .master-dropdown:focus {
      border-color: #58a6ff;
    }

    /* Universal Comment Wrapper Target */
    #comment-target {
      min-height: 250px;
      color: #ffffff;
      margin-bottom: 10px;
    }

    /* ======================================================= */
    /* INLINE DARK OVERRIDES (FOR GITALK / GITMENT / WALINE)   */
    /* ======================================================= */
    .gt-container .gt-comment-content, 
    .gitment-comment-main {
      background-color: #0d1117 !important;
      border: 1px solid #30363d !important;
    }
    .gt-container .gt-no-comment, .gt-container .gt-comment-username, 
    .gt-container .gt-user-name, .gt-container .gt-header-username, 
    .gt-container .gt-comment-body, .gt-container .gt-comment-body *, 
    .gt-container .gt-meta, .gt-container .gt-counts,
    .gitment-comment-body, .gitment-editor-main textarea {
      color: #ffffff !important;
    }
    .gt-container .gt-header-textarea, .gitment-editor-main textarea {
      background-color: #0d1117 !important;
      border: 1px solid #30363d !important;
      color: #ffffff !important;
    }
    /* Waline Theme Color Refactoring Variables */
    :root {
      --waline-background: #161b22 !important;
      --waline-white: #0d1117 !important;
      --waline-text-color: #ffffff !important;
      --waline-border-color: #30363d !important;
    }
  </style>
</head>
<body>

<div class="reddit-container">

  <!-- Header Section -->
  <div class="forum-header">
    <div class="community-avatar">
      <img src="GitDiscuss.png" alt="GitDiscuss Logo">
    </div>
    <div>
      <h2 class="forum-title">GitDiscuss Hub</h2>
      <p class="forum-subtitle">Configure your comment interface and select cross-origin filters instantly:</p>
    </div>
  </div>

  <!-- Dual Control Selector Layout Panel -->
  <div class="selectors-row">
    <!-- Dropdown Control 1: Engine Switcher Backend Framework Configuration -->
    <div class="selector-group">
      <span class="selector-label">Engine:</span>
      <select id="engine-select" class="master-dropdown">
        <option value="utterances" selected>🐙 Utterances</option>
        <option value="giscus">⚡ Giscus</option>
        <option value="gitalk">💬 Gitalk</option>
        <option value="waline">🧱 Waline</option>
        <option value="gitment">📜 Gitment</option>
      </select>
    </div>

    <!-- Dropdown Control 2: Forum Context Category Filters -->
    <div class="selector-group">
      <span class="selector-label">Topic:</span>
      <select id="topic-select" class="master-dropdown">
        <option value="general" selected>💬 General</option>
        <option value="qa">❓ Q&A</option>
        <option value="ideas">💡 Ideas</option>
        <option value="showAndTell">🙌 Show and Tell</option>
      </select>
    </div>
  </div>

  <!-- Universal Render Space Work Area Target Frame -->
  <div id="comment-target"></div>

</div>

<!-- ======================================================= -->
<!-- ROUTER IMPLEMENTATION LOGIC ARCHITECTURE               -->
<!-- ======================================================= -->
<script>
  // Helper dynamic resource handlers matching asset paths asynchronously
  function loadCSS(url) {
    if (document.querySelector(`link[href="${url}"]`)) return;
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = url;
    document.head.appendChild(link);
  }

  function loadJS(url, callback) {
    const script = document.createElement('script');
    script.src = url;
    script.async = true;
    script.onload = callback;
    document.head.appendChild(script);
  }

  const targetBox = document.getElementById('comment-target');
  const engineSelector = document.getElementById('engine-select');
  const topicSelector = document.getElementById('topic-select');

  // Unified Master Engine Router Logic
  function executeCommentRouter(engineType, topicKey) {
    targetBox.innerHTML = ''; // Safely drop previous node instances

    // Short-form identifier parsing for thread keys matching framework rules under 45 chars
    let computedPath = window.location.pathname;
    if (computedPath.length > 25) {
      computedPath = computedPath.substring(0, 25);
    }
    const uniqueIdString = `${computedPath}-${topicKey}`;

    switch(engineType) {
      
      case 'utterances':
        const utScript = document.createElement('script');
        utScript.src = 'https://utteranc.es/client.js';
        utScript.async = true;
        utScript.crossOrigin = 'anonymous';
        utScript.setAttribute('repo', 'gitdiscuss/GitDiscuss');
        utScript.setAttribute('issue-term', 'GitDiscuss Topic: ' + topicKey); // Maps thread by topic
        utScript.setAttribute('theme', 'github-dark');
        targetBox.appendChild(utScript);
        break;

      case 'giscus':
        const gsScript = document.createElement('script');
        gsScript.src = 'https://giscus.app/client.js';
        gsScript.async = true;
        gsScript.crossOrigin = 'anonymous';
        gsScript.setAttribute('data-repo', 'gitdiscuss/GitDiscuss');
        gsScript.setAttribute('data-repo-id', 'R_kgDOTcYYmQ');
        gsScript.setAttribute('data-category', 'General');
        gsScript.setAttribute('data-category-id', 'DIC_kwDOTcYYmc4DBc_i');
        gsScript.setAttribute('data-mapping', 'pathname');
        gsScript.setAttribute('data-term', 'GitDiscuss Topic: ' + topicKey); // Dynamically routes by topic
        gsScript.setAttribute('data-strict', '0');
        gsScript.setAttribute('data-reactions-enabled', '1');
        gsScript.setAttribute('data-emit-metadata', '0');
        gsScript.setAttribute('data-input-position', 'bottom');
        gsScript.setAttribute('data-theme', 'dark_tritanopia');
        gsScript.setAttribute('data-lang', 'en');
        targetBox.appendChild(gsScript);
        break;

      case 'gitalk':
        loadCSS('https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.css');
        
        const initGitalk = () => {
          const wrapper = document.createElement('div');
          wrapper.id = 'gitalk-inner-box';
          targetBox.appendChild(wrapper);
          
          const gitalk = new Gitalk({
            clientID: 'Ov23liBVujhCSsK2POnS',
            clientSecret: 'e066432aef2146c1dc3dd6a2cdf1c3c4b0d5577b',
            repo: 'gitdiscuss-gitalk',
            owner: 'gitdiscuss',
            admin: ['gitdiscuss'],
            id: uniqueIdString,
            labels: ['Gitalk', topicKey], // Tag issues by topic dynamically
            distractionFreeMode: false
          });
          gitalk.render('gitalk-inner-box');
        };

        // Verify if class constructor is already present globally to avoid dependency injection collisions
        if (window.Gitalk) {
          initGitalk();
        } else {
          loadJS('https://cdn.jsdelivr.net/npm/gitalk@1/dist/gitalk.js', initGitalk);
        }
        break;

      case 'waline':
        loadCSS('https://cdn.jsdelivr.net/npm/@waline/client@v2/dist/waline.css');
        const initWaline = () => {
          const walineWrapper = document.createElement('div');
          walineWrapper.id = 'waline-inner';
          targetBox.appendChild(walineWrapper);
          Waline.init({
            el: '#waline-inner',
            serverURL: 'https://waline-vercel-mlmifftvw-treat-inc.vercel.app',
            path: uniqueIdString // Scopes storage collections per topic
          });
        };

        if (window.Waline) {
          initWaline();
        } else {
          loadJS('https://cdn.jsdelivr.net/npm/@waline/client@v2/dist/waline.js', initWaline);
        }
        break;

      case 'gitment':
        loadCSS('https://imsun.github.io/gitment/style/default.css');
        const initGitment = () => {
          const gitmentWrapper = document.createElement('div');
          gitmentWrapper.id = 'gitment-inner';
          targetBox.appendChild(gitmentWrapper);
          
          const gitment = new Gitment({
            id: uniqueIdString,
            owner: 'gitdiscuss',
            repo: 'GitDiscuss',
            oauth: {
              client_id: 'Ov23liwIQx9u3pM9ho0I',
              client_secret: '4e44a871c3156f46aa7ad78d297337ef39e71078',
            },
          });
          gitment.render('gitment-inner');
        };

        if (window.Gitment) {
          initGitment();
        } else {
          loadJS('https://imsun.github.io/gitment/dist/gitment.browser.js', initGitment);
        }
        break;
    }
  }

  // Event handlers checking for switch updates
  function triggerEngineReload() {
    executeCommentRouter(engineSelector.value, topicSelector.value);
  }

  engineSelector.addEventListener('change', triggerEngineReload);
  topicSelector.addEventListener('change', triggerEngineReload);

  // Initialize workspace setup on document launch loop
  triggerEngineReload();
</script>

</body>
</html>
