<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitDiscuss</title>
  <link rel="icon" type="image/png" href="GitDiscuss.png">
  <style>
    /* ============================================================
       THEME PALETTES — all colours live here as variables.
       The toggle swaps between them. 🎨
    ============================================================ */

    /* ---- LIGHT (GitHub Light Tritanopia style) ---- */
    :root {
      --bg: #ffffff;
      --card: #f6f8fa;
      --panel: #eaeef2;
      --input: #ffffff;
      --border: #d0d7de;
      --fg: #1f2328;
      --muted: #59636e;
      --accent: #0969da;
      --shadow: 0 8px 24px rgba(140, 149, 159, 0.2);
    }

    /* ---- DARK (GitHub Dark Tritanopia) ---- */
    html.dark {
      --bg: #0d1117;
      --card: #161b22;
      --panel: #21262d;
      --input: #0d1117;
      --border: #30363d;
      --fg: #f0f6fc;
      --muted: #8b949e;
      --accent: #58a6ff;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    /* 1. Page background follows the theme */
    body {
      background-color: var(--bg);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      box-sizing: border-box;
      transition: background-color 0.25s;
    }

    /* Theme toggle button */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 38px;
      height: 38px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--fg);
      z-index: 999;
      line-height: 1;
    }
    .theme-toggle:hover { filter: brightness(1.1); }

    /* 2. The "Reddit Card" container */
    .reddit-container {
      width: 100%;
      max-width: 850px;
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: var(--shadow);
      box-sizing: border-box;
      transition: background-color 0.25s;
    }

    /* 3. Header */
    .forum-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .community-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .community-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .forum-title {
      margin: 0;
      font-size: 1.5rem;
      color: var(--fg);
      font-weight: 600;
    }

    .forum-subtitle {
      margin: 4px 0 0 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* 4. Dropdown Topic Selector */
    .topic-selector-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      background-color: var(--panel);
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .topic-label {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .topic-dropdown {
      background-color: var(--input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      padding: 6px 12px;
      font-size: 0.95rem;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      font-family: inherit;
      flex-grow: 1;
    }

    .topic-dropdown:focus {
      border-color: var(--accent);
    }

    /* 5. Footer Buttons */
    .link-buttons {
      display: flex;
      gap: 12px;
      margin-top: 25px;
      flex-wrap: wrap;
      justify-content: center;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .link-button img {
      width: 20px;
      height: 20px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<button class="theme-toggle" id="themeBtn" title="Switch theme">🌙</button>

<!-- This is the card holding everything -->
<div class="reddit-container">

  <!-- Header -->
  <div class="forum-header">
    <div class="community-avatar">
      <img src="GitDiscuss.png" alt="GitDiscuss Logo">
    </div>
    <div>
      <h2 class="forum-title">GitDiscuss</h2>
      <p class="forum-subtitle">Upvote, reply, and share your thoughts!</p>
    </div>
  </div>

  <!-- Topic Switcher Dropdown -->
  <div class="topic-selector-container">
    <span class="topic-label">Filter Topic:</span>
    <select id="topic-select" class="topic-dropdown">
      <option value="general" selected>💬 General</option>
      <option value="qa">❓ Q&A</option>
      <option value="ideas">💡 Ideas</option>
      <option value="showAndTell">🙌 Show and Tell</option>
    </select>
  </div>

  <!-- Giscus will load inside this div -->
  <div class="giscus"></div>

  <!-- Link buttons -->
  <div class="link-buttons">
    <a class="link-button" href="https://github.com/giscus/giscus" target="_blank" rel="noopener noreferrer">
      <img src="giscus.png" alt="Giscus">
      <span>Giscus</span>
    </a>
    <a class="link-button" href="https://github.com/gitdiscuss/GitDiscuss" target="_blank" rel="noopener noreferrer">
      <img src="GitDiscuss.png" alt="GitDiscuss">
      <span>GitDiscuss</span>
    </a>
  </div>

</div>

<!-- ======================================================= -->
<!-- THEME TOGGLE (with live Giscus theme switching!)        -->
<!-- ======================================================= -->
<script>
  const themeBtn = document.getElementById("themeBtn");

  /* which Giscus theme matches which page theme */
  function giscusTheme() {
    return document.documentElement.classList.contains("dark")
      ? "dark_tritanopia"
      : "light_tritanopia";
  }

  /* tell the already-loaded Giscus iframe to switch themes live */
  function updateGiscusTheme() {
    const iframe = document.querySelector("iframe.giscus-frame");
    if (!iframe) return;
    iframe.contentWindow.postMessage(
      { giscus: { setConfig: { theme: giscusTheme() } } },
      "https://giscus.app"
    );
  }

  function setTheme(dark, save) {
    document.documentElement.classList.toggle("dark", dark);
    themeBtn.textContent = dark ? "☀️" : "🌙";
    if (save) localStorage.setItem("gd-theme", dark ? "dark" : "light");
    updateGiscusTheme();
  }

  /* saved choice first, otherwise match their device setting */
  const savedTheme = localStorage.getItem("gd-theme");
  if (savedTheme) setTheme(savedTheme === "dark", false);
  else setTheme(matchMedia("(prefers-color-scheme: dark)").matches, false);

  themeBtn.onclick = () =>
    setTheme(!document.documentElement.classList.contains("dark"), true);
</script>

<!-- ======================================================= -->
<!-- DYNAMIC GISCUS LOADER SCRIPT                            -->
<!-- ======================================================= -->
<script>
  // 1. Map your Giscus Categories to their actual Category IDs on GitHub.
  // REMINDER: Make sure to replace these placeholder IDs with the unique ones generated from giscus.app for your new personal account!
  const categories = {
    general: { name: "General", id: "DIC_kwDOTcYYmc4DBc_i" }, 
    qa: { name: "Q&A", id: "DIC_kwDOTcYYmc4DBc_j" },
    ideas: { name: "Ideas", id: "DIC_kwDOTcYYmc4DBc_k" },
    showAndTell: { name: "Show and Tell", id: "DIC_kwDOTcYYmc4DBc_l" }
  };

  // 2. The core loading function
  function loadGiscus(categoryKey) {
    const categoryObj = categories[categoryKey];
    if (!categoryObj) return;

    const container = document.querySelector('.giscus');
    container.innerHTML = ''; // Wipe out the previous iframe

    // Build the script element from scratch
    const script = document.createElement('script');
    script.src = "https://giscus.app/client.js";
    
    // Points to your new personal account repo
    script.setAttribute('data-repo', "gitdiscuss/GitDiscuss");
    
    // REMINDER: Switch this to your new repository's unique ID from giscus.app
    script.setAttribute('data-repo-id', "R_kgDOTcYYmQ"); 
    
    script.setAttribute('data-category', categoryObj.name);
    script.setAttribute('data-category-id', categoryObj.id);
    script.setAttribute('data-mapping', "pathname");
    script.setAttribute('data-strict', "0");
    script.setAttribute('data-reactions-enabled', "1");
    script.setAttribute('data-emit-metadata', "0");
    script.setAttribute('data-input-position', "bottom");
    script.setAttribute('data-theme', giscusTheme());   // follows the toggle!
    script.setAttribute('data-lang', "en");
    script.setAttribute('crossorigin', "anonymous");
    script.async = true;

    // Inject into the page
    container.appendChild(script);
  }

  // 3. Event Listener: Swapping when dropdown option changes
  document.getElementById('topic-select').addEventListener('change', (e) => {
    loadGiscus(e.target.value);
  });

  // 4. Load the default option (General) on initial page load
  loadGiscus('general');
</script>

</body>
</html>
